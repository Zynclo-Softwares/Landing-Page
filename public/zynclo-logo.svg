<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#f0f0f0" stroke-width="2"/>
  
  <!-- Main geometric shape - Z pattern with sync concept -->
  <g fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Z shape -->
    <path d="M 70 60 L 130 60 L 70 140 L 130 140" stroke-width="4"/>
    
    <!-- Sync arrows on corners -->
    <circle cx="60" cy="50" r="8" fill="#1a1a1a"/>
    <circle cx="140" cy="150" r="8" fill="#1a1a1a"/>
  </g>
  
  <!-- Text "ZYNCLO" -->
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a" letter-spacing="1">ZYNCLO</text>
</svg>